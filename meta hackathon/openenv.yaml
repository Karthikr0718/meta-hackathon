name: "workflow-optimization-env"
version: "1.0.0"
description: "AI agent workflow optimization under budget and time constraints"

metadata:
  author: "Karthik"
  license: "MIT"

api:
  observation_type: "models.Observation"
  action_type: "models.Action"
  reward_type: "models.Reward"

endpoints:
  reset: true
  step: true
  state: true

environment:
  tasks:
    - id: "easy"
      difficulty: "easy"
      description: "Single-step job search workflow"
    - id: "medium"
      difficulty: "medium"
      description: "Multi-step candidate enrichment workflow"
    - id: "hard"
      difficulty: "hard"
      description: "Complex workflow with adversarial failures"

constraints:
  max_steps: 20
  budget_limits: [5.0, 10.0, 4.0]
  time_limits: [30.0, 60.0, 45.0]
